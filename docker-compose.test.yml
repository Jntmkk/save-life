# Test environment compose — all services run prebuilt images from Aliyun ACR
# (built by GitHub Actions). Watchtower on the host auto-updates containers
# when new :latest images are pushed.
#
# Usage:
#   docker compose -f docker-compose.test.yml pull
#   docker compose -f docker-compose.test.yml up -d
services:
  iii-init:
    image: registry.cn-hangzhou.aliyuncs.com/u-rep/save-life-math-worker:${TAG:-latest}
    user: "0:0"
    volumes:
      - backend_data:/data
    entrypoint: ["sh", "-c", "chown -R 65532:65532 /data && chmod 755 /data"]
    restart: "no"

  backend:
    image: registry.cn-hangzhou.aliyuncs.com/u-rep/save-life-backend:${TAG:-latest}
    container_name: save-life-backend
    user: "65532:65532"
    ports:
      - "3111:3111"    # REST API
      - "49134:49134"  # WebSocket (worker connections)
      - "3112:3112"    # Stream API
      - "9464:9464"    # Prometheus metrics
    volumes:
      - backend_data:/app/data
    environment:
      RUST_LOG: info
      III_EXECUTION_CONTEXT: docker
    depends_on:
      iii-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - save-life

  math-worker:
    image: registry.cn-hangzhou.aliyuncs.com/u-rep/save-life-math-worker:${TAG:-latest}
    container_name: save-life-math-worker
    environment:
      III_URL: ws://backend:49134
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - save-life

  caller-worker:
    image: registry.cn-hangzhou.aliyuncs.com/u-rep/save-life-caller-worker:${TAG:-latest}
    container_name: save-life-caller-worker
    environment:
      III_URL: ws://backend:49134
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - save-life

  auth:
    image: registry.cn-hangzhou.aliyuncs.com/u-rep/save-life-auth:${TAG:-latest}
    container_name: save-life-auth
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      DB_HOST: ${DB_HOST:?set DB_HOST in .env}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:?set DB_USER in .env}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      DB_NAME: ${DB_NAME:-save_life_test}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
    restart: unless-stopped
    networks:
      - save-life

  frontend:
    image: registry.cn-hangzhou.aliyuncs.com/u-rep/save-life-frontend:${TAG:-latest}
    container_name: save-life-frontend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
    depends_on:
      - backend
      - auth
    restart: unless-stopped
    networks:
      - save-life

  # iii Console: engine ops UI
  console:
    image: registry.cn-hangzhou.aliyuncs.com/u-rep/save-life-backend:${TAG:-latest}
    container_name: save-life-console
    command:
      - console
      - --host
      - 0.0.0.0
      - --engine-host
      - backend
      - --engine-port
      - "3111"
      - --ws-port
      - "3112"
      - --bridge-port
      - "49134"
      - --port
      - "3113"
    ports:
      - "3113:3113"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - save-life

networks:
  save-life:
    driver: bridge

volumes:
  backend_data:
