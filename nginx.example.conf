# 示例：服务器上 Nginx 反向代理到本机 Docker Compose 服务
# 把此文件放到 /etc/nginx/conf.d/ 并修改 server_name 后 reload nginx

server {
    listen 80;
    server_name ali.frxxz.top;  # 改成你的域名或服务器 IP

    # 前端静态站点
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # iii HTTP API
    location /api/ {
        proxy_pass http://127.0.0.1:3111/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # iii WebSocket
    location /ws {
        proxy_pass http://127.0.0.1:49134;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}

# iii Console（建议用独立子域名，并加 basic auth 保护）
server {
    listen 80;
    server_name console.ali.frxxz.top;  # 改成你的 console 子域名

    location / {
        proxy_pass http://127.0.0.1:3113;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 建议加上 basic auth，因为 console 可操作引擎
        # auth_basic "iii console";
        # auth_basic_user_file /etc/nginx/.htpasswd;
    }
}
