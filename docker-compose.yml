services:
  iii-init:
    image: registry.cn-hangzhou.aliyuncs.com/u-rep/save-life-math-worker:${TAG:-latest}
    user: "0:0"
    volumes:
      - backend_data:/data
    entrypoint: ["sh", "-c", "chown -R 65532:65532 /data && chmod 755 /data"]
    restart: "no"

  backend:
    build:
      context: ./backend-save-life
    image: registry.cn-hangzhou.aliyuncs.com/u-rep/save-life-backend:${TAG:-latest}
    container_name: save-life-backend
    user: "65532:65532"
    ports:
      - "127.0.0.1:3111:3111"    # REST API
      - "127.0.0.1:49134:49134"  # WebSocket (worker connections)
      - "127.0.0.1:3112:3112"    # Stream API
      - "127.0.0.1:9464:9464"    # Prometheus metrics
    volumes:
      - backend_data:/app/data
    environment:
      RUST_LOG: info
      III_EXECUTION_CONTEXT: docker
    depends_on:
      iii-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - save-life

  math-worker:
    build:
      context: ./backend-save-life/workers/math-worker
    image: registry.cn-hangzhou.aliyuncs.com/u-rep/save-life-math-worker:${TAG:-latest}
    container_name: save-life-math-worker
    environment:
      III_URL: ws://backend:49134
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - save-life

  caller-worker:
    build:
      context: ./backend-save-life/workers/caller-worker
    image: registry.cn-hangzhou.aliyuncs.com/u-rep/save-life-caller-worker:${TAG:-latest}
    container_name: save-life-caller-worker
    environment:
      III_URL: ws://backend:49134
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - save-life

  frontend:
    build:
      context: ./front-save-life
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.fake-rest.refine.dev}
    image: registry.cn-hangzhou.aliyuncs.com/u-rep/save-life-frontend:${TAG:-latest}
    container_name: save-life-frontend
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      PORT: 3000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - save-life

  # iii Console：引擎的可视化运维界面
  console:
    image: registry.cn-hangzhou.aliyuncs.com/u-rep/save-life-backend:${TAG:-latest}
    container_name: save-life-console
    command:
      - console
      - --host
      - 0.0.0.0
      - --engine-host
      - backend
      - --engine-port
      - "3111"
      - --ws-port
      - "3112"
      - --bridge-port
      - "49134"
      - --port
      - "3113"
    ports:
      - "127.0.0.1:3113:3113"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - save-life

networks:
  save-life:
    driver: bridge

volumes:
  backend_data:
